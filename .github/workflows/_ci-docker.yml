name: CI Docker

on:
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: web

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ inputs.target }}
          push: false
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  hadolint:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3016,DL3041,DL3059

  dockle:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ inputs.target }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha

      - name: dockle
        uses: goodwithtech/dockle-action@v0.4.15
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: 'list'
          exit-code: '1'
          exit-level: 'fatal'
          ignore: 'CIS-DI-0010,DKL-DI-0005'

  trivy:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ inputs.target }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha

      - name: trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
