name: CI Docker

on:
  push:
    branches:
      - master
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-app:
    permissions:
      contents: read
    uses: ./.github/workflows/_ci-docker.yml

  ci-lambda:
    permissions:
      contents: read
    uses: ./.github/workflows/_ci-docker.yml
    with:
      target: lambda
