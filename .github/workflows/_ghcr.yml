on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      target:
        required: false
        type: string
        default: app

permissions: {}

jobs:
  build-amd64:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: ${{ inputs.target }}
          provenance: false
          platforms: linux/amd64
          tags: ${{ inputs.image_name }}:amd64
          push: true
          cache-from: type=gha
          annotations: |
            org.opencontainers.image.source=https://github.com/codefirst/sunline
            org.opencontainers.image.description=A lightweight script and log management tool for DevOps
            org.opencontainers.image.licenses=MIT

  build-arm64:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: ${{ inputs.target }}
          provenance: false
          platforms: linux/arm64
          tags: ${{ inputs.image_name }}:arm64
          push: true
          cache-from: type=gha
          annotations: |
            org.opencontainers.image.source=https://github.com/codefirst/sunline
            org.opencontainers.image.description=A lightweight script and log management tool for DevOps
            org.opencontainers.image.licenses=MIT

  merge:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-amd64, build-arm64]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Create manifest list and push
        run: |
          docker buildx imagetools create -t "$REPO:latest" \
            --annotation "index:org.opencontainers.image.source=$SOURCE" \
            --annotation "index:org.opencontainers.image.description=$DESCRIPTION" \
            --annotation "index:org.opencontainers.image.licenses=$LICENSES" \
            "$REPO@$AMD_DIGEST" \
            "$REPO@$ARM_DIGEST"
        env:
          REPO: ${{ inputs.image_name }}
          AMD_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM_DIGEST: ${{ needs.build-arm64.outputs.digest }}
          SOURCE: https://github.com/codefirst/sunline
          DESCRIPTION: A lightweight script and log management tool for DevOps
          LICENSES: MIT
