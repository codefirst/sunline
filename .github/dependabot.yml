version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"

  - package-ecosystem: "bundler"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"

  - package-ecosystem: "npm"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"
    groups:
      codemirror:
        patterns:
          - "@codemirror/*"

  - package-ecosystem: "docker"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"
